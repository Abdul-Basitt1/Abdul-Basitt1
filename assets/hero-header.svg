<svg width="1400" height="460" viewBox="0 0 1400 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1400" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="30%" stop-color="#0F172A"/>
      <stop offset="62%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F766E"/>
      <animate attributeName="x1" values="0;120;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1400;1280;1400" dur="14s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Main title gradient -->
    <linearGradient id="titleGradient" x1="260" y1="110" x2="1140" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#E2E8F0"/>
      <stop offset="72%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#C084FC"/>
      <animate attributeName="x1" values="260;340;260" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1140;1040;1140" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Accent gradients -->
    <radialGradient id="orbLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.50"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="70%" stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22D3EE" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#A855F7" flood-opacity="0.18"/>
    </filter>

    <clipPath id="clip">
      <rect width="1400" height="460" rx="0"/>
    </clipPath>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base -->
    <rect width="1400" height="460" fill="url(#bgGradient)"/>

    <!-- Grid -->
    <rect width="1400" height="460" fill="url(#grid)" opacity="0.45"/>

    <!-- Animated large orbs -->
    <circle cx="250" cy="110" r="220" fill="url(#orbLeft)">
      <animate attributeName="cx" values="250;320;250" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="110;150;110" dur="12s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1130" cy="120" r="260" fill="url(#orbRight)">
      <animate attributeName="cx" values="1130;1070;1130" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;165;120" dur="11s" repeatCount="indefinite"/>
    </circle>

    <!-- Geometric accent rings -->
    <g opacity="0.22">
      <circle cx="1110" cy="125" r="120" stroke="#67E8F9" stroke-width="1.5" fill="none">
        <animate attributeName="r" values="110;128;110" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1110" cy="125" r="165" stroke="#A855F7" stroke-width="1.2" fill="none">
        <animate attributeName="r" values="155;173;155" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Floating particles -->
    <g opacity="0.8">
      <circle cx="215" cy="92" r="3" fill="#22D3EE">
        <animate attributeName="cy" values="92;82;92" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="320" r="2.5" fill="#C084FC">
        <animate attributeName="cy" values="320;306;320" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0.9;0.25" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1180" cy="104" r="3" fill="#A855F7">
        <animate attributeName="cy" values="104;94;104" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1035" cy="308" r="2.8" fill="#67E8F9">
        <animate attributeName="cy" values="308;295;308" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="640" cy="72" r="2.4" fill="#FFFFFF">
        <animate attributeName="cy" values="72;62;72" dur="3.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Main glass panel -->
    <g filter="url(#panelShadow)">
      <rect x="104" y="58" width="1192" height="280" rx="34" fill="#050816" fill-opacity="0.22"/>
      <rect x="104.5" y="58.5" width="1191" height="279" rx="33.5" stroke="white" stroke-opacity="0.10"/>
    </g>

    <!-- Top tiny UI dots -->
    <g opacity="0.9">
      <circle cx="145" cy="90" r="5" fill="#22D3EE"/>
      <circle cx="165" cy="90" r="5" fill="#8B5CF6"/>
      <circle cx="185" cy="90" r="5" fill="#F472B6"/>
    </g>

    <!-- Code brackets for character -->
    <g filter="url(#softGlow)" opacity="0.95">
      <text x="185" y="218" font-family="'JetBrains Mono', Consolas, monospace" font-size="64" font-weight="700" fill="#22D3EE" opacity="0">
        &lt;
        <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.15s" fill="freeze"/>
        <animate attributeName="x" values="165;185" dur="0.7s" begin="0.15s" fill="freeze"/>
      </text>
      <text x="1198" y="218" font-family="'JetBrains Mono', Consolas, monospace" font-size="64" font-weight="700" fill="#A855F7" opacity="0">
        /&gt;
        <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.3s" fill="freeze"/>
        <animate attributeName="x" values="1220;1198" dur="0.7s" begin="0.3s" fill="freeze"/>
      </text>
    </g>

    <!-- Main heading -->
    <text
      x="700"
      y="196"
      text-anchor="middle"
      font-family="'Space Grotesk', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="92"
      font-weight="800"
      letter-spacing="-3"
      fill="url(#titleGradient)"
      filter="url(#softGlow)"
      opacity="0"
    >
      Abdul Basit
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.35s" fill="freeze"/>
      <animate attributeName="y" values="216;196" dur="1s" begin="0.35s" fill="freeze"/>
    </text>

    <!-- Animated underline -->
    <rect x="430" y="220" width="0" height="4" rx="2" fill="url(#lineGradient)">
      <animate attributeName="width" values="0;540" dur="1.1s" begin="1s" fill="freeze"/>
    </rect>

    <!-- Subheading -->
    <text
      x="700"
      y="273"
      text-anchor="middle"
      font-family="'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="29"
      font-weight="600"
      letter-spacing="0.2"
      fill="#E2E8F0"
      opacity="0"
    >
      Full Stack React Native Developer • Mobile + Web3 Builder
      <animate attributeName="opacity" values="0;0.98" dur="0.95s" begin="1.15s" fill="freeze"/>
      <animate attributeName="y" values="288;273" dur="0.95s" begin="1.15s" fill="freeze"/>
    </text>

    <!-- Bottom glow line -->
    <rect x="250" y="360" width="900" height="1.6" fill="url(#lineGradient)" opacity="0.42">
      <animate attributeName="opacity" values="0.18;0.55;0.18" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom abstract hills -->
    <path d="M0 370C155 340 328 392 510 365C694 337 818 305 1011 328C1178 348 1288 354 1400 333V460H0V370Z" fill="#020617" opacity="0.58"/>
    <path d="M0 394C189 360 356 406 541 386C742 364 863 341 1042 360C1189 376 1299 387 1400 372V460H0V394Z" fill="#020617" opacity="0.83"/>

    <!-- Scanning highlight -->
    <rect x="-340" y="0" width="220" height="460" fill="white" opacity="0.035" transform="skewX(-18)">
      <animate attributeName="x" values="-340;1540" dur="6.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
