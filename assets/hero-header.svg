<svg width="1200" height="300" viewBox="100 50 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberBg" x1="0" y1="0" x2="1400" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="32%" stop-color="#0B1120"/>
      <stop offset="68%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#041C32"/>
      <animate attributeName="x1" values="0;80;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1400;1320;1400" dur="14s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="nameGradient" x1="250" y1="100" x2="1140" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="45%" stop-color="#7DD3FC"/>
      <stop offset="75%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A855F7"/>
      <animate attributeName="x1" values="250;340;250" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1140;1040;1140" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.36"/>
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#67E8F9"/>
      <stop offset="80%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.50"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#22D3EE" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#A855F7" flood-opacity="0.22"/>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="white" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>

    <clipPath id="clip">
      <rect x="100" y="50" width="1200" height="300" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1400" height="460" fill="url(#cyberBg)"/>
    <rect width="1400" height="460" fill="url(#grid)" opacity="0.55"/>

    <circle cx="210" cy="110" r="210" fill="url(#glowLeft)">
      <animate attributeName="cx" values="210;270;210" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="110;145;110" dur="12s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1170" cy="120" r="250" fill="url(#glowRight)">
      <animate attributeName="cx" values="1170;1110;1170" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;155;120" dur="10s" repeatCount="indefinite"/>
    </circle>

    <g opacity="0.55">
      <path d="M120 96H290L330 136H510" stroke="#22D3EE" stroke-width="2" stroke-dasharray="8 8">
        <animate attributeName="stroke-dashoffset" values="0;-64" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M1280 104H1110L1070 144H885" stroke="#A855F7" stroke-width="2" stroke-dasharray="8 8">
        <animate attributeName="stroke-dashoffset" values="0;64" dur="4.5s" repeatCount="indefinite"/>
      </path>
      <path d="M180 346H330L370 308H520" stroke="#22D3EE" stroke-width="2" stroke-dasharray="10 8">
        <animate attributeName="stroke-dashoffset" values="0;-72" dur="5s" repeatCount="indefinite"/>
      </path>
      <path d="M1220 340H1080L1030 300H890" stroke="#A855F7" stroke-width="2" stroke-dasharray="10 8">
        <animate attributeName="stroke-dashoffset" values="0;72" dur="5.4s" repeatCount="indefinite"/>
      </path>
    </g>

    <g opacity="0.65">
      <circle cx="294" cy="96" r="4" fill="#22D3EE"/>
      <circle cx="1110" cy="104" r="4" fill="#A855F7"/>
      <circle cx="332" cy="346" r="4" fill="#22D3EE"/>
      <circle cx="1080" cy="340" r="4" fill="#A855F7"/>
    </g>

    <g opacity="0.09">
      <rect x="0" y="58" width="1400" height="1" fill="#FFFFFF"/>
      <rect x="0" y="118" width="1400" height="1" fill="#FFFFFF"/>
      <rect x="0" y="178" width="1400" height="1" fill="#FFFFFF"/>
      <rect x="0" y="238" width="1400" height="1" fill="#FFFFFF"/>
      <rect x="0" y="298" width="1400" height="1" fill="#FFFFFF"/>
      <rect x="0" y="358" width="1400" height="1" fill="#FFFFFF"/>
    </g>

    <g filter="url(#panelShadow)">
      <rect x="102" y="56" width="1196" height="288" rx="30" fill="#020617" fill-opacity="0.20"/>
      <rect x="102.5" y="56.5" width="1195" height="287" rx="29.5" stroke="#FFFFFF" stroke-opacity="0.10"/>
    </g>

    <g opacity="0.95">
      <rect x="132" y="84" width="112" height="26" rx="13" fill="#0F172A" fill-opacity="0.55" stroke="#22D3EE" stroke-opacity="0.25"/>
      <text x="188" y="101" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11" font-weight="700" letter-spacing="1.6" fill="#7DD3FC">SYSTEM ONLINE</text>
    </g>

    <g opacity="0.85">
      <path d="M136 132V114H154" stroke="#22D3EE" stroke-width="2.4"/>
      <path d="M1246 114H1264V132" stroke="#A855F7" stroke-width="2.4"/>
      <path d="M154 286H136V268" stroke="#22D3EE" stroke-width="2.4"/>
      <path d="M1264 268V286H1246" stroke="#A855F7" stroke-width="2.4"/>
    </g>

    <text
      x="700"
      y="196"
      text-anchor="middle"
      font-family="'Space Grotesk', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="94"
      font-weight="800"
      letter-spacing="-3"
      fill="url(#nameGradient)"
      filter="url(#softGlow)"
      opacity="0"
    >
      Abdul Basit
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.2s" fill="freeze"/>
      <animate attributeName="y" values="216;196" dur="1s" begin="0.2s" fill="freeze"/>
    </text>

    <rect x="408" y="222" width="0" height="4" rx="2" fill="url(#lineGlow)">
      <animate attributeName="width" values="0;584" dur="1s" begin="0.95s" fill="freeze"/>
    </rect>

    <text
      x="700"
      y="276"
      text-anchor="middle"
      font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace"
      font-size="27"
      font-weight="600"
      letter-spacing="0.8"
      fill="#E2E8F0"
      opacity="0"
    >
      Full Stack React Native Developer • Mobile + Web3 Builder
      <animate attributeName="opacity" values="0;0.98" dur="0.9s" begin="1.1s" fill="freeze"/>
      <animate attributeName="y" values="292;276" dur="0.9s" begin="1.1s" fill="freeze"/>
    </text>

    <rect x="-300" y="0" width="180" height="460" fill="white" opacity="0.04" transform="skewX(-16)">
      <animate attributeName="x" values="-300;1550" dur="7s" repeatCount="indefinite"/>
    </rect>

    <path d="M0 370C165 336 340 391 538 365C731 340 860 305 1047 326C1193 343 1294 352 1400 336V460H0V370Z" fill="#020617" opacity="0.58"/>
    <path d="M0 396C180 364 364 409 560 388C754 367 885 348 1068 365C1207 378 1307 388 1400 377V460H0V396Z" fill="#020617" opacity="0.84"/>
  </g>
</svg>
