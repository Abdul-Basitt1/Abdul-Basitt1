<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="meshMain" x1="0" y1="0" x2="1400" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="28%" stop-color="#111827"/>
      <stop offset="52%" stop-color="#1E1B4B"/>
      <stop offset="74%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#0891B2"/>
      <animate attributeName="x1" values="0;180;0" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1400;1180;1400" dur="10s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGradient" x1="250" y1="130" x2="1120" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="42%" stop-color="#E0F2FE"/>
      <stop offset="72%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#C084FC"/>
      <animate attributeName="x1" values="250;330;250" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1120;1030;1120" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="titleGlow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22D3EE" flood-opacity="0.28"/>
    </filter>

    <clipPath id="rounded">
      <rect width="1400" height="430" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1400" height="430" fill="url(#meshMain)"/>

    <circle cx="1080" cy="80" r="260" fill="url(#glowCyan)">
      <animate attributeName="cx" values="1080;1160;1080" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;130;80" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="260" cy="330" r="300" fill="url(#glowPurple)">
      <animate attributeName="cx" values="260;210;260" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="330;280;330" dur="11s" repeatCount="indefinite"/>
    </circle>

    <circle cx="720" cy="210" r="230" fill="#0EA5E9" opacity="0.08">
      <animate attributeName="r" values="210;260;210" dur="8s" repeatCount="indefinite"/>
    </circle>

    <path d="M0 342C176 302 318 359 490 326C670 292 742 255 933 294C1102 328 1223 314 1400 267V430H0V342Z" fill="#020617" opacity="0.62"/>
    <path d="M0 365C186 322 329 371 511 344C713 313 838 293 1014 321C1168 346 1274 350 1400 315V430H0V365Z" fill="#020617" opacity="0.82"/>

    <g opacity="0.42">
      <path d="M180 92H1220" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <path d="M180 336H1220" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <path d="M255 40V360" stroke="#FFFFFF" stroke-opacity="0.06"/>
      <path d="M1145 40V360" stroke="#FFFFFF" stroke-opacity="0.06"/>
    </g>

    <g opacity="0.72">
      <circle cx="214" cy="96" r="3" fill="#22D3EE">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1184" cy="118" r="3" fill="#A855F7">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1038" cy="314" r="2.5" fill="#67E8F9">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="354" cy="286" r="2.5" fill="#C084FC">
        <animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g filter="url(#softShadow)">
      <rect x="118" y="72" width="1164" height="250" rx="34" fill="#020617" opacity="0.18"/>
      <rect x="119" y="73" width="1162" height="248" rx="33" stroke="#FFFFFF" stroke-opacity="0.08"/>
    </g>

    <text
      x="700"
      y="186"
      text-anchor="middle"
      font-family="'Space Grotesk', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="88"
      font-weight="800"
      letter-spacing="-3"
      fill="url(#titleGradient)"
      filter="url(#titleGlow)"
      opacity="0"
    >
      Abdul Basit
      <animate attributeName="opacity" values="0;1" dur="1.1s" begin="0.15s" fill="freeze"/>
      <animate attributeName="y" values="205;186" dur="1.1s" begin="0.15s" fill="freeze"/>
    </text>

    <text
      x="700"
      y="248"
      text-anchor="middle"
      font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace"
      font-size="27"
      font-weight="600"
      letter-spacing="0.4"
      fill="#E2E8F0"
      opacity="0"
    >
      Full Stack React Native Developer • Mobile + Web3 Builder
      <animate attributeName="opacity" values="0;0.95" dur="1.1s" begin="0.75s" fill="freeze"/>
      <animate attributeName="y" values="262;248" dur="1.1s" begin="0.75s" fill="freeze"/>
    </text>

    <g opacity="0">
      <rect x="514" y="282" width="372" height="2" rx="1" fill="url(#titleGradient)"/>
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.25s" fill="freeze"/>
    </g>
  </g>
</svg>
